<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PLM — BOM Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../static/css/main.css">
<script src="../static/js/theme.js"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-body-tertiary">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg border-bottom sticky-top glass-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">
      <div class="ratio ratio-1x1 rounded ds-logo d-flex align-items-center justify-content-center" style="width: 32px; background: linear-gradient(135deg, #0d6efd, #6610f2); box-shadow: 0 4px 10px rgba(13, 110, 253, 0.4);"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ffffff" viewBox="0 0 16 16"><path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923z"/></svg></div>
      PLM System
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="topNav">
      <div class="ms-auto d-flex align-items-center gap-3 mt-3 mt-lg-0">
        <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center p-0" style="width:36px;height:36px;" title="Toggle Theme">🌙</button>
        <button class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center p-0 shadow-sm transition-all" style="width:36px;height:36px;" id="user-icon" title="Sign out" onclick="if(confirm('Sign out?')){localStorage.clear();location.href='login.html'}">
          👤
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid flex-grow-1 d-flex p-0" style="overflow-x: hidden;">
  <!-- Sidebar -->
  <div class="sidebar border-end p-3 d-none d-lg-block bg-body">
    <div class="small fw-bold text-uppercase text-muted mb-2 px-3 pt-2">Main Menu</div>
    <div class="nav flex-column nav-pills gap-1">
      <a href="dashboard.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">🏠</span> Dashboard</a>
      <a href="products.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">📦</span> Products</a>
      <a href="bom.html" class="nav-link active d-flex align-items-center gap-2"><span class="fs-5">🔧</span> Bill of Materials</a>
      <a href="ecos.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">📋</span> ECOs</a>
    </div>
    <div class="small fw-bold text-uppercase text-muted mb-2 px-3 pt-4">Insights</div>
    <div class="nav flex-column nav-pills gap-1">
      <a href="reports.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">📊</span> Reports</a>
      <a href="settings.html" class="nav-link d-flex align-items-center gap-2" id="settings-link" style="display:none !important;"><span class="fs-5">⚙️</span> Settings</a>
    </div>
  </div>

  <main class="main-content flex-grow-1 p-4 p-md-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 pb-3 border-bottom gap-3">
      <div>
        <h1 class="h2 fw-bold mb-1" id="page-title">New BOM</h1>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary" onclick="location.href='bom.html'">← Back</button>
        <button class="btn btn-primary d-flex align-items-center gap-2 shadow-sm hover-elevate transition-all" id="btn-save">Save BOM</button>
      </div>
    </div>
    <div id="alert-error" class="alert alert-danger d-none align-items-center gap-2 mb-4 shadow-sm border-danger-subtle"><span class="fs-5">❌</span> <span id="alert-msg"></span></div>

    <!-- Header Fields -->
    <div class="card bg-body border-0 shadow-sm mb-4">
      <div class="card-body p-4 p-md-5">
        <div class="row g-4">
          <div class="col-md-4">
            <label class="form-label fw-medium text-secondary small text-uppercase">Reference</label>
            <input class="form-control form-control-lg bg-body-tertiary border-0 fw-bold text-primary" id="field-reference" readonly placeholder="Auto-generated">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-medium text-secondary small text-uppercase">Finished Product <span class="text-danger">*</span></label>
            <select class="form-select form-select-lg bg-body-tertiary border-0" id="field-product"><option value="">Select product…</option></select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-medium text-secondary small text-uppercase">Quantity <span class="text-danger">*</span></label>
            <input class="form-control form-control-lg bg-body-tertiary border-0" id="field-quantity" type="number" step="0.001" min="0.001" value="1">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-medium text-secondary small text-uppercase">Unit</label>
            <select class="form-select form-select-lg bg-body-tertiary border-0" id="field-unit"><option>Units</option><option>Kg</option><option>Liters</option><option>Meters</option><option>Pieces</option></select>
          </div>
          <div class="col-md-4">
            <label class="form-label fw-medium text-secondary small text-uppercase">Version</label>
            <input class="form-control form-control-lg bg-body-tertiary border-0" id="field-version" readonly placeholder="1">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-medium text-secondary small text-uppercase">Status</label>
            <input class="form-control form-control-lg bg-body-tertiary border-0" id="field-status" readonly placeholder="Active">
          </div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="card bg-body border-0 shadow-sm">
      <div class="card-header bg-transparent pt-4 px-4 border-bottom-0 pb-0">
        <ul class="nav nav-tabs border-bottom-0" id="bomTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active fw-medium px-4 text-secondary pb-3" id="components-tab" data-bs-toggle="tab" data-bs-target="#tab-components" type="button" role="tab" style="border:0; border-bottom:2px solid transparent;">🔩 Components</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link fw-medium px-4 text-secondary pb-3" id="operations-tab" data-bs-toggle="tab" data-bs-target="#tab-operations" type="button" role="tab" style="border:0; border-bottom:2px solid transparent;">⚙️ Work Orders</button>
          </li>
        </ul>
      </div>

      <div class="card-body p-0 border-top">
        <div class="tab-content" id="bomTabsContent">
          <!-- Components Tab -->
          <div class="tab-pane fade show active p-4" id="tab-components" role="tabpanel">
            <div class="table-responsive border rounded mb-3">
              <table class="table table-borderless table-striped align-middle mb-0">
                <thead class="table-light border-bottom"><tr>
                  <th class="ps-3 text-secondary small text-uppercase w-50">Component Product</th>
                  <th class="text-secondary small text-uppercase">Quantity</th>
                  <th class="text-secondary small text-uppercase">Unit</th>
                  <th></th>
                </tr></thead>
                <tbody id="components-body"></tbody>
              </table>
            </div>
            <button class="btn btn-outline-primary btn-sm d-flex align-items-center gap-2" id="btn-add-component">
              <span class="fs-6">+</span> Add a product
            </button>
          </div>

          <!-- Operations Tab -->
          <div class="tab-pane fade p-4" id="tab-operations" role="tabpanel">
            <div class="table-responsive border rounded mb-3">
              <table class="table table-borderless table-striped align-middle mb-0">
                <thead class="table-light border-bottom"><tr>
                  <th class="ps-3 text-secondary small text-uppercase w-50">Work Center</th>
                  <th class="text-secondary small text-uppercase">Expected Duration (min)</th>
                  <th></th>
                </tr></thead>
                <tbody id="operations-body"></tbody>
              </table>
            </div>
            <button class="btn btn-outline-primary btn-sm d-flex align-items-center gap-2" id="btn-add-operation">
              <span class="fs-6">+</span> Add an operation
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Sync tab styles dynamically (active border bottom)
  const tabs = document.querySelectorAll('button[data-bs-toggle="tab"]');
  tabs.forEach(t => t.addEventListener('shown.bs.tab', e => {
    tabs.forEach(tab => tab.classList.remove('border-primary', 'text-body'));
    e.target.classList.add('border-primary', 'text-body');
  }));
  document.getElementById('components-tab').classList.add('border-primary', 'text-body');
</script>
<script type="module">
import { api, getCurrentRole, isLoggedIn } from '../static/js/api.js';
if (!isLoggedIn()) { window.location.href = 'login.html'; }

const role = getCurrentRole();
const bomId = new URLSearchParams(location.search).get('id');
let activeProducts = [];

function showError(msg) {
  document.getElementById('alert-msg').textContent = msg;
  document.getElementById('alert-error').classList.remove('d-none');
  document.getElementById('alert-error').classList.add('d-flex');
}

function productOptions(selectedId = null) {
  return activeProducts.map(p =>
    `<option value="${p.id}" ${p.id == selectedId ? 'selected' : ''}>${p.name}</option>`
  ).join('');
}

function addComponentRow(comp = {}) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="ps-3"><select class="form-select bg-body-tertiary border-0 comp-product"><option value="">Select…</option>${productOptions(comp.component_product_id)}</select></td>
    <td><input class="form-control bg-body-tertiary border-0 comp-qty" type="number" step="0.001" value="${comp.quantity||''}"></td>
    <td><select class="form-select bg-body-tertiary border-0 comp-unit"><option>Units</option><option>Kg</option><option>Liters</option><option>Meters</option></select></td>
    <td class="text-end pe-3"><button class="btn btn-link text-danger p-0" onclick="this.closest('tr').remove()" title="Delete">🗑️</button></td>`;
  if (comp.unit) tr.querySelector('.comp-unit').value = comp.unit;
  document.getElementById('components-body').appendChild(tr);
}

function addOperationRow(op = {}) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="ps-3"><input class="form-control bg-body-tertiary border-0 op-wc" type="text" value="${op.work_center||''}" placeholder="Assembly Line 1"></td>
    <td><input class="form-control bg-body-tertiary border-0 op-dur" type="number" value="${op.expected_duration_mins||'0'}"></td>
    <td class="text-end pe-3"><button class="btn btn-link text-danger p-0" onclick="this.closest('tr').remove()" title="Delete">🗑️</button></td>`;
  document.getElementById('operations-body').appendChild(tr);
}

document.getElementById('btn-add-component').addEventListener('click', () => addComponentRow());
document.getElementById('btn-add-operation').addEventListener('click', () => addOperationRow());

async function init() {
  activeProducts = await api.products.list('', 'active');
  const productSelect = document.getElementById('field-product');
  productSelect.innerHTML = `<option value="">Select product…</option>${activeProducts.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}`;

  if (bomId) {
    document.getElementById('page-title').textContent = 'BOM Details';
    const bom = await api.boms.get(bomId);
    document.getElementById('field-reference').value = bom.reference;
    document.getElementById('field-product').value = bom.product_id;
    document.getElementById('field-quantity').value = bom.quantity;
    document.getElementById('field-unit').value = bom.unit;
    document.getElementById('field-version').value = `v${bom.version}`;
    document.getElementById('field-status').value = bom.status.charAt(0).toUpperCase() + bom.status.slice(1);
    
    bom.components?.forEach(addComponentRow);
    bom.operations?.forEach(addOperationRow);
    
    if (bom.status === 'archived' || role === 'operations' || role === 'approver') {
      document.querySelectorAll('.form-control, .form-select, .btn-link').forEach(el => el.disabled = true);
      document.getElementById('btn-save').style.display = 'none';
      document.getElementById('btn-add-component').style.display = 'none';
      document.getElementById('btn-add-operation').style.display = 'none';
    }
  }
}

document.getElementById('btn-save').addEventListener('click', async () => {
  const product_id = document.getElementById('field-product').value;
  const quantity   = document.getElementById('field-quantity').value;
  const unit       = document.getElementById('field-unit').value;
  document.getElementById('alert-error').classList.add('d-none');
  
  if (!product_id || !quantity) { showError('Product and Quantity are required.'); return; }

  const components = [...document.querySelectorAll('#components-body tr')].map(tr => ({
    component_product_id: +tr.querySelector('.comp-product').value,
    quantity: tr.querySelector('.comp-qty').value,
    unit: tr.querySelector('.comp-unit').value,
  })).filter(c => c.component_product_id);

  const operations = [...document.querySelectorAll('#operations-body tr')].map(tr => ({
    work_center: tr.querySelector('.op-wc').value,
    expected_duration_mins: +tr.querySelector('.op-dur').value,
  })).filter(o => o.work_center);

  document.getElementById('btn-save').disabled = true;
  document.getElementById('btn-save').innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Saving…';
  
  try {
    const bom = await api.boms.create({ product_id: +product_id, quantity: +quantity, unit, components, operations });
    window.location.href = `bom_form.html?id=${bom.id}`;
  } catch (e) {
    showError(e.message);
    document.getElementById('btn-save').disabled = false;
    document.getElementById('btn-save').textContent = 'Save BOM';
  }
});

init().catch(e => showError(e.message));
</script>
</body>
</html>
