            </div>
          </div>
        </div>

          <div id="table-body" class="p-5 text-center">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { api, getCurrentRole, isLoggedIn } from '../static/js/api.js';
if (!isLoggedIn()) { window.location.href = 'login.html'; }
const role = getCurrentRole();
if(document.getElementById('dropdown-user-name')) {
    let p = {};
    try { p = (typeof getTokenPayload !== 'undefined') ? getTokenPayload() : JSON.parse(atob(sessionStorage.getItem('access_token').split('.')[1])); } catch(e){}
    const n = p.name || p.first_name || p.username || sessionStorage.getItem('login_id') || 'User';
    document.getElementById('dropdown-user-name').textContent = 'User : ' + n;
    document.getElementById('dropdown-user-role').textContent = 'Role : ' + (role || sessionStorage.getItem('role') || 'Unknown').toUpperCase();
}

if(document.getElementById('role-badge')) document.getElementById('role-badge').textContent = role?.toUpperCase();
document.getElementById('role-badge').textContent = role?.toUpperCase();
if (role === 'admin') document.getElementById('settings-link').style.setProperty('display', 'flex', 'important');
if (role === 'operations') document.getElementById('btn-new').style.display = 'none';

async function load(search = '') {
  document.getElementById('table-body').innerHTML = '<div class="p-5 text-center"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div></div>';
  try {
    const data = await api.boms.list(search);
    if (!data.length) {
      document.getElementById('table-body').innerHTML = '<div class="empty-state p-5"><div class="display-3 mb-3 opacity-50">🔧</div><h5>No BOMs found.</h5></div>';
      return;
    }
    document.getElementById('table-body').innerHTML = `<table class="table table-hover align-middle mb-0"><thead class="table-light"><tr>
      <th class="ps-4">Reference</th><th>Finished Product</th><th>Version</th><th class="pe-4">Status</th>
    </tr></thead><tbody>${data.map(b=>`<tr class="data-table-row" onclick="location.href='bom_form.html?id=${b.id}'">
      <td class="ps-4 fw-bold text-primary">${b.reference}</td>
      <td class="fw-medium">${b.product_name}</td>
      <td><span class="badge bg-secondary-subtle text-secondary border rounded-pill px-3">v${b.version}</span></td>
      <td class="pe-4"><span class="badge bg-${b.status==='active'?'success':'danger'}-subtle text-${b.status==='active'?'success':'danger'} border border-${b.status==='active'?'success':'danger'}-subtle rounded-pill px-3 py-2 text-capitalize">${b.status}</span></td>
    </tr>`).join('')}</tbody></table>`;
  } catch(e) {
    document.getElementById('table-body').innerHTML = `<div class="alert alert-danger m-4 d-flex align-items-center gap-2"><span class="fs-4">⚠️</span> <div>${e.message}</div></div>`;
  }
}
let debounce;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(debounce); debounce = setTimeout(() => load(e.target.value), 300);
});
load();
</script>
</body>
