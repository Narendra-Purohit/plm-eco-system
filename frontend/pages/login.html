<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLM — Sign In</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../static/css/main.css">
<script src="../static/js/theme.js"></script>
</head>
<body class="auth-wrapper d-flex align-items-center justify-content-center p-3 p-md-0">

  <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle position-absolute top-0 end-0 m-4 d-flex align-items-center justify-content-center" style="width:40px;height:40px;" title="Toggle Theme">🌙</button>

  <div class="card bg-body border-0 hover-elevate transition-all auth-card p-4 p-md-5">
    <div class="text-center mb-5">
      <div class="ratio ratio-1x1 rounded ds-logo d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; background: linear-gradient(135deg, #0d6efd, #6610f2); box-shadow: 0 4px 10px rgba(13, 110, 253, 0.4);">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffffff" viewBox="0 0 16 16"><path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923z"/></svg>
      </div>
      <h1 class="h3 fw-bold mb-1">PLM System</h1>
      <p class="text-secondary small">Engineering Changes, Executed with Control</p>
    </div>

    <div id="alert-error" class="alert alert-danger d-none align-items-center gap-2 mb-4 shadow-sm border-danger-subtle">
      <span>❌</span> <span id="error-message">Invalid Login Id or Password</span>
    </div>
    <div id="alert-success" class="alert alert-success d-none align-items-center gap-2 mb-4 shadow-sm border-success-subtle">
      <span>✅</span> Account created successfully! Please sign in.
    </div>

    <div class="mb-4">
      <label class="form-label fw-medium text-secondary small text-uppercase">Login ID <span class="text-danger">*</span></label>
      <input class="form-control form-control-lg bg-body-tertiary border-0" id="input-login-id" type="text" placeholder="Enter your login ID" autocomplete="username" />
    </div>

    <div class="mb-4">
      <label class="form-label fw-medium text-secondary small text-uppercase">Password <span class="text-danger">*</span></label>
      <input class="form-control form-control-lg bg-body-tertiary border-0" id="input-password" type="password" placeholder="Enter your password" autocomplete="current-password" />
    </div>

    <button class="btn btn-primary btn-lg w-100 fw-bold shadow-sm hover-elevate transition-all d-flex align-items-center justify-content-center gap-2" id="btn-signin">
      <span id="btn-signin-text">Sign In</span>
      <span id="btn-signin-spinner" class="spinner-border spinner-border-sm" style="display:none"></span>
    </button>

    <div class="d-flex justify-content-between mt-4 fs-6">
      <a href="#" class="text-secondary text-decoration-none" onclick="alert('Contact your admin to reset password.')">Forgot Password?</a>
      <a href="signup.html" class="text-primary text-decoration-none fw-medium">Create Account</a>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { api, isLoggedIn } from '../static/js/api.js';

if (isLoggedIn()) window.location.href = 'dashboard.html';

if (new URLSearchParams(location.search).get('registered')) {
  document.getElementById('alert-success').classList.remove('d-none');
  document.getElementById('alert-success').classList.add('d-flex');
}

document.getElementById('btn-signin').addEventListener('click', async () => {
  const loginId  = document.getElementById('input-login-id').value.trim();
  const password = document.getElementById('input-password').value;
  const errDiv   = document.getElementById('alert-error');
  const spinner  = document.getElementById('btn-signin-spinner');
  const btnText  = document.getElementById('btn-signin-text');

  errDiv.classList.add('d-none');
  errDiv.classList.remove('d-flex');

  if (!loginId || !password) {
    document.getElementById('error-message').textContent = 'Please fill in all fields.';
    errDiv.classList.remove('d-none');
    errDiv.classList.add('d-flex');
    return;
  }

  spinner.style.display = 'inline-block'; btnText.textContent = 'Signing in…';
  document.getElementById('btn-signin').disabled = true;

  try {
    const data = await api.auth.login(loginId, password);
    localStorage.setItem('access_token', data.access);
    localStorage.setItem('refresh_token', data.refresh);
    const payload = JSON.parse(atob(data.access.split('.')[1]));
    localStorage.setItem('role', payload.role);
    localStorage.setItem('user_id', payload.user_id);
    localStorage.setItem('login_id', payload.login_id);
    window.location.href = 'dashboard.html';
  } catch (e) {
    document.getElementById('error-message').textContent = 'Invalid Login Id or Password';
    errDiv.classList.remove('d-none');
    errDiv.classList.add('d-flex');
  } finally {
    spinner.style.display = 'none'; btnText.textContent = 'Sign In';
    document.getElementById('btn-signin').disabled = false;
  }
});

document.getElementById('input-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-signin').click();
});
</script>
</body>
</html>
