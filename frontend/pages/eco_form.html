<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PLM — ECO Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../static/css/main.css">
<script src="../static/js/theme.js"></script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'><circle cx='20' cy='20' r='18' fill='%23155EEF'/><circle cx='20' cy='20' r='9' fill='none' stroke='%23fff' stroke-width='2.5'/><path d='M14 20 A6 6 0 0 1 26 20' fill='none' stroke='%23fff' stroke-width='2.5' stroke-linecap='round'/><polyline points='24,17 26,20 23,21' fill='none' stroke='%23fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
</head>
<body class="d-flex flex-column min-vh-100 bg-body-tertiary">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg border-bottom sticky-top glass-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">
      <div class="ratio ratio-1x1 rounded ds-logo d-flex align-items-center justify-content-center" style="width: 32px;"><svg viewBox="0 0 40 40" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
  <circle cx="20" cy="20" r="9" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3"/>
  <path d="M14 20 A6 6 0 0 1 26 20" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
  <polyline points="24,17 26,20 23,21" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg></div>
      PLM System
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="topNav">
      <div class="ms-auto d-flex align-items-center gap-3 mt-3 mt-lg-0">
        <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center p-0" style="width:36px;height:36px;" title="Toggle Theme">🌙</button>
        <button class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center p-0 shadow-sm transition-all" style="width:36px;height:36px;" id="user-icon" title="Sign out" onclick="if(confirm('Sign out?')){localStorage.clear();location.href='login.html'}">
          👤
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid flex-grow-1 d-flex p-0" style="overflow-x: hidden;">
  <!-- Sidebar -->
  <div class="sidebar border-end p-3 d-none d-lg-block bg-body">
    <div class="small fw-bold text-uppercase text-muted mb-2 px-3 pt-2">Main Menu</div>
    <div class="nav flex-column nav-pills gap-1">
      <a href="dashboard.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">🏠</span> Dashboard</a>
      <a href="products.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">📦</span> Products</a>
      <a href="bom.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">🔧</span> Bill of Materials</a>
      <a href="ecos.html" class="nav-link active d-flex align-items-center gap-2"><span class="fs-5">📋</span> ECOs</a>
    </div>
    <div class="small fw-bold text-uppercase text-muted mb-2 px-3 pt-4">Insights</div>
    <div class="nav flex-column nav-pills gap-1">
      <a href="reports.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">📊</span> Reports</a>
      <a href="settings.html" class="nav-link d-flex align-items-center gap-2" id="settings-link" style="display:none !important;"><span class="fs-5">⚙️</span> Settings</a>
    </div>
  </div>

  <main class="main-content flex-grow-1 p-4 p-md-5">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 pb-3 border-bottom gap-3">
      <div>
        <h1 class="h2 fw-bold mb-1" id="page-title">New ECO</h1>
        <p class="text-secondary mb-0" id="page-subtitle">Engineering Change Order</p>
      </div>
      <div class="d-flex flex-wrap gap-2" id="action-buttons">
        <button class="btn btn-outline-secondary btn-sm" onclick="location.href='ecos.html'">← Back</button>
        <button class="btn btn-primary btn-sm shadow-sm" id="btn-save">Save</button>
        <button class="btn btn-success btn-sm shadow-sm" id="btn-start" style="display:none">▶ Start ECO</button>
        <button class="btn btn-secondary btn-sm shadow-sm" id="btn-validate" style="display:none">⏩ Validate</button>
        <button class="btn btn-primary btn-sm shadow-sm" id="btn-approve" style="display:none">✅ Approve</button>
        <button class="btn btn-danger btn-sm shadow-sm" id="btn-reject" style="display:none">✗ Reject</button>
        <button class="btn btn-outline-secondary btn-sm" id="btn-open-product" style="display:none">📦 Open Product</button>
        <button class="btn btn-outline-secondary btn-sm" id="btn-open-bom" style="display:none">🔧 Open BOM</button>
        <button class="btn btn-info text-white btn-sm shadow-sm" id="btn-view-diff" style="display:none">🔍 View Changes</button>
      </div>
    </div>

    <!-- Alert -->
    <div id="alert-error" class="alert alert-danger d-none align-items-center gap-2 mb-4 shadow-sm border-danger-subtle"><span class="fs-5">❌</span> <span id="alert-msg"></span></div>
    <div id="alert-success" class="alert alert-success d-none align-items-center gap-2 mb-4 shadow-sm border-success-subtle"><span class="fs-5">✅</span> <span id="alert-ok-msg"></span></div>

    <!-- Stage pills -->
    <div class="d-flex align-items-center flex-wrap gap-1 mb-4" id="stage-pills-row"></div>

    <!-- ECO Header Form -->
    <div class="card bg-body border-0 shadow-sm mb-4">
      <div class="card-body p-4 p-md-5">
        <div class="row g-4">
          <div class="col-12">
            <label class="form-label fw-medium text-secondary small text-uppercase">ECO Title <span class="text-danger">*</span></label>
            <input class="form-control form-control-lg bg-body-tertiary border-0" id="field-title" maxlength="255" placeholder="Describe the change…">
          </div>
          <div class="col-md-6">
            <label class="form-label fw-medium text-secondary small text-uppercase">ECO Type <span class="text-danger">*</span></label>
            <select class="form-select form-select-lg bg-body-tertiary border-0" id="field-eco-type">
              <option value="product">📦 Product</option>
              <option value="bom">🔧 Bill of Materials</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-medium text-secondary small text-uppercase">Responsible User</label>
            <select class="form-select form-select-lg bg-body-tertiary border-0" id="field-user"></select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-medium text-secondary small text-uppercase">Product <span class="text-danger">*</span></label>
            <select class="form-select form-select-lg bg-body-tertiary border-0" id="field-product"><option value="">Select product…</option></select>
          </div>
          <div class="col-md-6" id="bom-group" style="display:none">
            <label class="form-label fw-medium text-secondary small text-uppercase">BOM <span class="text-danger">*</span></label>
            <select class="form-select form-select-lg bg-body-tertiary border-0" id="field-bom"><option value="">Select BOM…</option></select>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-medium text-secondary small text-uppercase">Version Update?</label>
            <select class="form-select form-select-lg bg-body-tertiary border-0" id="field-version-update">
              <option value="true">Yes — create new version</option>
              <option value="false">No — update in place</option>
            </select>
          </div>
          <div class="col-md-6" id="group-effective-date">
            <label class="form-label fw-medium text-secondary small text-uppercase">Effective Date</label>
            <input class="form-control form-control-lg bg-body-tertiary border-0 text-muted" id="field-effective-date" readonly placeholder="Set when ECO is applied">
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { api, getCurrentRole, getCurrentUserId, isLoggedIn } from '../static/js/api.js';
if (!isLoggedIn()) { window.location.href = 'login.html'; }

const role   = getCurrentRole();
const userId = getCurrentUserId();
if (role === 'admin') document.getElementById('settings-link').style.setProperty('display', 'flex', 'important');
const ecoId  = new URLSearchParams(location.search).get('id');
let allStages = [];
let ecoData   = null;

function showError(msg)   { document.getElementById('alert-msg').textContent=msg; document.getElementById('alert-error').classList.remove('d-none'); document.getElementById('alert-error').classList.add('d-flex'); document.getElementById('alert-success').classList.add('d-none'); document.getElementById('alert-success').classList.remove('d-flex'); }
function showSuccess(msg) { document.getElementById('alert-ok-msg').textContent=msg; document.getElementById('alert-success').classList.remove('d-none'); document.getElementById('alert-success').classList.add('d-flex'); document.getElementById('alert-error').classList.add('d-none'); document.getElementById('alert-error').classList.remove('d-flex'); }

function lockAllFields() {
  document.querySelectorAll('#field-title,#field-eco-type,#field-user,#field-product,#field-bom,#field-version-update').forEach(el => el.disabled = true);
  document.getElementById('btn-save').style.display = 'none';
}

function renderStagePills(eco) {
  if (!allStages.length) return;
  const currentSeq = eco.stage_sequence;
  const row = document.getElementById('stage-pills-row');
  row.innerHTML = allStages.map((s, i) => {
    let cls, arrow = '';
    if (s.sequence < currentSeq) cls = 'bg-success text-white border-0';
    else if (s.sequence === currentSeq) cls = 'bg-primary text-white border-0 shadow-sm';
    else cls = 'bg-body-secondary text-secondary border-0 opacity-75';
    if (i < allStages.length - 1) arrow = '<span class="text-muted mx-1 px-1 opacity-50">›</span>';
    return `<div class="d-flex align-items-center"><span class="badge rounded-pill px-3 py-2 fw-medium ${cls}">${s.name}</span>${arrow}</div>`;
  }).join('');
}

function applyStateUI(eco) {
  ecoData = eco;
  document.getElementById('page-title').textContent = eco.title;
  document.getElementById('page-subtitle').innerHTML = `<span class="badge bg-secondary-subtle text-secondary me-2 border">${eco.eco_type.toUpperCase()}</span> <span class="badge bg-info-subtle text-info text-uppercase border">${eco.status}</span>`;

  document.getElementById('field-title').value           = eco.title;
  document.getElementById('field-eco-type').value        = eco.eco_type;
  document.getElementById('field-product').value         = eco.product;
  document.getElementById('field-version-update').value  = eco.version_update ? 'true' : 'false';
  document.getElementById('field-user').value            = eco.user;
  if (eco.bom) {
    document.getElementById('bom-group').style.display = 'block';
    document.getElementById('field-bom').value = eco.bom;
  }
  if (eco.effective_date) {
    document.getElementById('field-effective-date').value = new Date(eco.effective_date).toLocaleString();
  }

  renderStagePills(eco);

  const isDraft   = eco.status === 'draft';
  const isActive  = eco.status === 'active';
  const isApplied = eco.status === 'applied';

  document.getElementById('btn-save').style.display     = isDraft && (role==='engineering'||role==='admin') ? 'inline-flex' : 'none';
  document.getElementById('btn-start').style.display    = isDraft && (role==='engineering'||role==='admin') ? 'inline-flex' : 'none';
  document.getElementById('btn-validate').style.display = isActive && (role==='engineering'||role==='admin') ? 'inline-flex' : 'none';
  document.getElementById('btn-approve').style.display  = isActive && (role==='approver'||role==='admin') ? 'inline-flex' : 'none';
  document.getElementById('btn-reject').style.display   = isActive && (role==='approver'||role==='admin') ? 'inline-flex' : 'none';

  if (!isDraft) lockAllFields();

  if (isActive) {
    if (eco.eco_type === 'product') document.getElementById('btn-open-product').style.display = 'inline-flex';
    if (eco.eco_type === 'bom')     document.getElementById('btn-open-bom').style.display = 'inline-flex';
  }
  if (eco.proposed_changes?.length) {
    document.getElementById('btn-view-diff').style.display = 'inline-flex';
  }

  if (isApplied) {
    document.getElementById('page-subtitle').innerHTML += ' <span class="badge bg-success text-white shadow-sm ms-2">✅ ECO Applied</span>';
  }
}

async function onProductChange() {
  const productId = document.getElementById('field-product').value;
  const ecoType   = document.getElementById('field-eco-type').value;
  document.getElementById('bom-group').style.setProperty('display', ecoType === 'bom' ? 'block' : 'none');
  if (ecoType !== 'bom') document.getElementById('field-bom').value = '';
  if (ecoType === 'bom' && productId) {
    const boms = await api.boms.list('');
    const filtered = boms.filter(b => b.product_id == productId && b.status === 'active');
    document.getElementById('field-bom').innerHTML =
      '<option value="">Select BOM…</option>' + filtered.map(b=>`<option value="${b.id}">${b.reference}</option>`).join('');
  }
}

document.getElementById('field-eco-type').addEventListener('change', onProductChange);
document.getElementById('field-product').addEventListener('change', onProductChange);

document.getElementById('btn-open-product').addEventListener('click', () => { window.open(`product_form.html?id=${ecoData.product}`, '_blank'); });
document.getElementById('btn-open-bom').addEventListener('click', () => { window.open(`bom_form.html?id=${ecoData.bom}`, '_blank'); });
document.getElementById('btn-view-diff').addEventListener('click', () => { window.open(`eco_diff.html?id=${ecoData.id}`, '_blank'); });

document.getElementById('btn-save').addEventListener('click', async () => {
  const title            = document.getElementById('field-title').value.trim();
  const eco_type         = document.getElementById('field-eco-type').value;
  const product          = +document.getElementById('field-product').value;
  const user             = +document.getElementById('field-user').value;
  const version_update   = document.getElementById('field-version-update').value === 'true';
  const bom_el           = document.getElementById('field-bom').value;
  const bom              = bom_el ? +bom_el : null;
  
  document.getElementById('alert-error').classList.add('d-none');
  
  if (!title || !eco_type || !product) { showError('Title, Type, and Product are required.'); return; }
  if (eco_type === 'bom' && !bom) { showError('BOM is required for BOM-type ECOs.'); return; }

  document.getElementById('btn-save').disabled = true;
  document.getElementById('btn-save').innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Saving…';
  try {
    const payload = { title, eco_type, product, user, version_update };
    if (bom) payload.bom = bom;
    const eco = ecoId
      ? await api.ecos.update(ecoId, payload)
      : await api.ecos.create(payload);
    if (!ecoId) { window.location.href = `eco_form.html?id=${eco.id}`; return; }
    applyStateUI(eco);
    showSuccess('ECO saved successfully.');
  } catch(e) {
    showError(e.message);
  } finally {
    document.getElementById('btn-save').disabled = false;
    document.getElementById('btn-save').textContent = 'Save';
  }
});

document.getElementById('btn-start').addEventListener('click', async () => {
  if (!confirm('Start this ECO? Fields will be locked for editing.')) return;
  try {
    const eco = await api.ecos.start(ecoId);
    applyStateUI(eco);
    showSuccess('ECO started. Fields are now locked. Record your proposed changes.');
  } catch(e) { showError(e.message); }
});

document.getElementById('btn-validate').addEventListener('click', async () => {
  try {
    const eco = await api.ecos.validate(ecoId);
    applyStateUI(eco);
    showSuccess(`Stage advanced to: ${eco.stage_name}`);
  } catch(e) { showError(e.message); }
});

document.getElementById('btn-approve').addEventListener('click', async () => {
  try {
    const eco = await api.ecos.approve(ecoId);
    applyStateUI(eco);
    showSuccess('Approved successfully.');
  } catch(e) { showError(e.message); }
});

document.getElementById('btn-reject').addEventListener('click', async () => {
  const reason = prompt('Reason for rejection:');
  if (!reason) return;
  try {
    await api.ecos.reject(ecoId, reason);
    showSuccess('ECO rejected and recorded.');
  } catch(e) { showError(e.message); }
});

async function init() {
  try { allStages = await api.settings.stages.list(); } catch {}
  
  const users = await api.auth.users();
  document.getElementById('field-user').innerHTML = users.map(u=>`<option value="${u.id}">${u.login_id} (${u.role})</option>`).join('');
  document.getElementById('field-user').value = userId;

  const products = await api.products.list('', 'active');
  document.getElementById('field-product').innerHTML =
    '<option value="">Select product…</option>' + products.map(p=>`<option value="${p.id}">${p.name} (v${p.version})</option>`).join('');

  if (ecoId) {
    const eco = await api.ecos.get(ecoId);
    applyStateUI(eco);
    document.getElementById('btn-start').style.display =
      eco.status === 'draft' && (role==='engineering'||role==='admin') ? 'inline-flex' : 'none';
    await onProductChange();
    if (eco.bom) document.getElementById('field-bom').value = eco.bom;
  }
}

init().catch(e => showError(e.message));
</script>
</body>
</html>
