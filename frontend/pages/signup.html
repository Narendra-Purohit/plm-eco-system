<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLM — Create Account</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../static/css/main.css">
<script src="../static/js/theme.js"></script>
</head>
<body class="auth-wrapper d-flex align-items-center justify-content-center p-3 p-md-0 py-5">

  <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle position-absolute top-0 end-0 m-4 d-flex align-items-center justify-content-center" style="width:40px;height:40px;" title="Toggle Theme">🌙</button>

  <div class="card bg-body border-0 hover-elevate transition-all auth-card p-4 p-md-5 my-5">
    <div class="text-center mb-5">
      <div class="ratio ratio-1x1 rounded ds-logo d-inline-flex align-items-center justify-content-center mb-3" style="width: 64px; background: linear-gradient(135deg, #0d6efd, #6610f2); box-shadow: 0 4px 10px rgba(13, 110, 253, 0.4);">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffffff" viewBox="0 0 16 16"><path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923z"/></svg>
      </div>
      <h1 class="h3 fw-bold mb-1">Create Account</h1>
      <p class="text-secondary small">Join the PLM system</p>
    </div>

    <div id="alert-global" class="alert alert-danger d-none align-items-center gap-2 mb-4 shadow-sm border-danger-subtle">
      <span>❌</span> <span id="global-error"></span>
    </div>

    <div class="mb-4">
      <label class="form-label fw-medium text-secondary small text-uppercase">Login ID <span class="text-danger">*</span></label>
      <input class="form-control form-control-lg bg-body-tertiary border-0" id="input-login-id" type="text" placeholder="6–12 characters" maxlength="12" />
      <div class="text-danger small mt-1" id="err-login-id"></div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-medium text-secondary small text-uppercase">Email <span class="text-danger">*</span></label>
      <input class="form-control form-control-lg bg-body-tertiary border-0" id="input-email" type="email" placeholder="you@company.com" />
      <div class="text-danger small mt-1" id="err-email"></div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-medium text-secondary small text-uppercase">Role</label>
      <select class="form-select form-select-lg bg-body-tertiary border-0" id="input-role">
        <option value="engineering">Engineering</option>
        <option value="approver">Approver</option>
        <option value="operations">Operations</option>
        <option value="admin">Admin</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label fw-medium text-secondary small text-uppercase">Password <span class="text-danger">*</span></label>
      <input class="form-control form-control-lg bg-body-tertiary border-0" id="input-password" type="password" placeholder="Min 8 chars, 1 upper, 1 lower, 1 special" />
      <div class="text-danger small mt-1" id="err-password"></div>
    </div>

    <div class="mb-5">
      <label class="form-label fw-medium text-secondary small text-uppercase">Confirm Password <span class="text-danger">*</span></label>
      <input class="form-control form-control-lg bg-body-tertiary border-0" id="input-confirm-password" type="password" placeholder="Repeat password" />
      <div class="text-danger small mt-1" id="err-confirm"></div>
    </div>

    <button class="btn btn-primary btn-lg w-100 fw-bold shadow-sm hover-elevate transition-all d-flex align-items-center justify-content-center gap-2" id="btn-signup">
      <span id="btn-text">Create Account</span>
      <span id="btn-spinner" class="spinner-border spinner-border-sm" style="display:none"></span>
    </button>

    <div class="text-center mt-4 text-secondary">
      Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-medium">Sign In</a>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { api } from '../static/js/api.js';

function setErr(id, msg) { document.getElementById(id).textContent = msg; }
function clearErrs() { ['err-login-id','err-email','err-password','err-confirm'].forEach(id => setErr(id,'')); }

function validatePassword(p) {
  if (p.length < 8) return 'Min 8 characters required.';
  if (!/[A-Z]/.test(p)) return 'At least 1 uppercase letter required.';
  if (!/[a-z]/.test(p)) return 'At least 1 lowercase letter required.';
  if (!/[^A-Za-z0-9]/.test(p)) return 'At least 1 special character required.';
  return '';
}

document.getElementById('input-login-id').addEventListener('input', e => {
  const v = e.target.value;
  setErr('err-login-id', v.length < 6 ? 'Min 6 characters.' : v.length > 12 ? 'Max 12 characters.' : '');
});

document.getElementById('input-password').addEventListener('input', e => {
  setErr('err-password', validatePassword(e.target.value));
});

document.getElementById('input-confirm-password').addEventListener('input', e => {
  const pw = document.getElementById('input-password').value;
  setErr('err-confirm', e.target.value !== pw ? 'Passwords do not match.' : '');
});

document.getElementById('btn-signup').addEventListener('click', async () => {
  clearErrs();
  const loginId  = document.getElementById('input-login-id').value.trim();
  const email    = document.getElementById('input-email').value.trim();
  const role     = document.getElementById('input-role').value;
  const password = document.getElementById('input-password').value;
  const confirm  = document.getElementById('input-confirm-password').value;
  let valid = true;

  if (loginId.length < 6 || loginId.length > 12) { setErr('err-login-id', 'Login ID must be 6–12 characters.'); valid = false; }
  if (!email.includes('@')) { setErr('err-email', 'Enter a valid email.'); valid = false; }
  const pwErr = validatePassword(password);
  if (pwErr) { setErr('err-password', pwErr); valid = false; }
  if (password !== confirm) { setErr('err-confirm', 'Passwords do not match.'); valid = false; }
  if (!valid) return;

  document.getElementById('btn-spinner').style.display = 'inline-block';
  document.getElementById('btn-text').textContent = 'Creating…';
  document.getElementById('btn-signup').disabled = true;

  try {
    await api.auth.signup({ login_id: loginId, email, password, confirm_password: confirm, role });
    window.location.href = 'login.html?registered=1';
  } catch (e) {
    document.getElementById('global-error').textContent = e.message;
    document.getElementById('alert-global').classList.remove('d-none');
    document.getElementById('alert-global').classList.add('d-flex');
  } finally {
    document.getElementById('btn-spinner').style.display = 'none';
    document.getElementById('btn-text').textContent = 'Create Account';
    document.getElementById('btn-signup').disabled = false;
  }
});
</script>
</body>
</html>
