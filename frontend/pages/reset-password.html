<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLM — Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/main.css">
    <script src="../static/js/theme.js"></script>
    <style>
        .auth-split-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
        }

        @media (max-width: 768px) {
            .auth-split-layout {
                grid-template-columns: 1fr;
            }

            .auth-brand-panel {
                display: none !important;
            }
        }

        .auth-brand-panel {
            background: var(--logo-bg);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 3rem;
        }

        .auth-brand-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
        }

        .auth-brand-panel::after {
            content: '';
            position: absolute;
            bottom: -60px;
            right: -60px;
            width: 400px;
            height: 400px;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
        }

        .brand-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .brand-content {
            position: relative;
            z-index: 2;
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            padding: 6px 16px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.04em;
            margin-bottom: 2rem;
        }

        .brand-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.7);
            }
        }

        .brand-headline {
            font-size: 2.8rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.15;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
        }

        .brand-sub {
            color: rgba(255, 255, 255, 0.65);
            font-size: 1.05rem;
            line-height: 1.7;
            max-width: 380px;
            margin-bottom: 2.5rem;
        }

        .auth-form-panel {
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem 2rem;
            position: relative;
        }

        .auth-form-inner {
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.5s var(--ez, cubic-bezier(0.4, 0, 0.2, 1)) forwards;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-form-inner .form-control {
            padding: 0.75rem 1rem !important;
            font-size: 0.9rem !important;
        }

        .auth-logo-wrap {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: var(--logo-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-logo);
            margin-bottom: 1.25rem;
        }

        .theme-controls {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
        }
    </style>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'><circle cx='20' cy='20' r='18' fill='%23155EEF'/><circle cx='20' cy='20' r='9' fill='none' stroke='%23fff' stroke-width='2.5'/><path d='M14 20 A6 6 0 0 1 26 20' fill='none' stroke='%23fff' stroke-width='2.5' stroke-linecap='round'/><polyline points='24,17 26,20 23,21' fill='none' stroke='%23fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
</head>

<body style="background: var(--bg-page);">
    <div class="auth-split-layout">
        <div class="auth-brand-panel">
            <div class="brand-grid"></div>
            <div class="brand-content">
                <div class="brand-badge">Account Security</div>
                <h1 class="brand-headline">Choose a<br>New<br>Password.</h1>
                <p class="brand-sub">Please create a strong, unique password to secure your workspace.</p>
            </div>
        </div>

        <div class="auth-form-panel">
            <div class="theme-controls">
                <button id="theme-toggle"
                    class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center"
                    style="width:38px;height:38px;" title="Toggle Theme">🌙</button>
            </div>

            <div class="auth-form-inner">
                <div class="auth-logo-wrap">
                    <svg viewBox="0 0 40 40" width="28" height="28" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="9" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" />
                        <path d="M14 20 A6 6 0 0 1 26 20" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5"
                            stroke-linecap="round" />
                        <polyline points="24,17 26,20 23,21" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>

                <h2 class="fw-bold mb-1" style="font-size:1.6rem; letter-spacing: -0.02em;">Reset Password</h2>
                <p class="mb-4" style="color: var(--text-muted); font-size:0.875rem;">Set a security key for your
                    account.</p>

                <div id="alert-error" class="alert alert-danger d-none align-items-center gap-2 mb-3 py-2 px-3"
                    style="font-size:0.85rem;">
                    <span>⚠️</span> <span id="error-message"></span>
                </div>

                <form id="reset-confirm-form">
                    <div class="mb-3">
                        <label class="form-label">6-DIGIT OTP CODE <span class="text-danger">*</span></label>
                        <input class="form-control" id="input-otp" type="text" placeholder="123456" required
                            minlength="6" maxlength="6" pattern="\d{6}"
                            style="letter-spacing: 0.2em; font-family: monospace;" />
                    </div>

                    <button type="button" class="btn btn-secondary w-100 fw-bold mb-4" id="btn-verify"
                        style="height:46px;">
                        <span id="btn-verify-text">Verify OTP</span>
                        <span id="btn-verify-spinner" class="spinner-border spinner-border-sm"
                            style="display:none"></span>
                    </button>

                    <div id="password-group" style="display: none; animation: fadeUp 0.4s forwards;">
                        <div class="mb-3">
                            <label class="form-label">NEW PASSWORD <span class="text-danger">*</span></label>
                            <input class="form-control" id="input-password" type="password" placeholder="••••••••"
                                minlength="8" />
                        </div>
                        <div class="mb-4">
                            <label class="form-label">CONFIRM PASSWORD <span class="text-danger">*</span></label>
                            <input class="form-control" id="input-confirm" type="password" placeholder="••••••••"
                                minlength="8" />
                        </div>
                        <button type="submit"
                            class="btn btn-primary w-100 fw-bold d-flex align-items-center justify-content-center gap-2 mb-4"
                            id="btn-submit" style="height:46px; font-size:0.95rem;">
                            <span id="btn-submit-text">Confirm New Password</span>
                            <span id="btn-submit-spinner" class="spinner-border spinner-border-sm"
                                style="display:none"></span>
                        </button>
                    </div>
                </form>

                <div class="d-flex justify-content-center" style="font-size:0.85rem;">
                    <a href="login.html" style="color: var(--text-muted); text-decoration:none;">← Back to log in</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { api } from '../static/js/api.js?v=1.1';

        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');

        if (!email) {
            document.getElementById('error-message').textContent = 'Invalid session. Please return to the login page.';
            document.getElementById('alert-error').classList.remove('d-none');
            document.getElementById('alert-error').classList.add('d-flex');
            document.getElementById('reset-confirm-form').style.display = 'none';
        }

        document.getElementById('btn-verify').addEventListener('click', async () => {
            const otpCode = document.getElementById('input-otp').value.trim();
            const errDiv = document.getElementById('alert-error');
            const spn = document.getElementById('btn-verify-spinner');
            const txt = document.getElementById('btn-verify-text');

            if (otpCode.length !== 6) return;

            errDiv.classList.add('d-none'); errDiv.classList.remove('d-flex');
            spn.style.display = 'inline-block';
            txt.textContent = 'Verifying...';
            document.getElementById('btn-verify').disabled = true;
            document.getElementById('input-otp').readOnly = true;

            try {
                await api.auth.verifyOTP(email, otpCode);
                document.getElementById('btn-verify').style.display = 'none';
                document.getElementById('password-group').style.display = 'block';
                document.getElementById('input-password').required = true;
                document.getElementById('input-confirm').required = true;
            } catch (err) {
                document.getElementById('error-message').textContent = err.message || 'Verification failed.';
                errDiv.classList.remove('d-none'); errDiv.classList.add('d-flex');
                document.getElementById('input-otp').readOnly = false;
                spn.style.display = 'none';
                txt.textContent = 'Verify OTP';
                document.getElementById('btn-verify').disabled = false;
            }
        });

        document.getElementById('reset-confirm-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = document.getElementById('input-otp').value;
            const pwd = document.getElementById('input-password').value;
            const cfm = document.getElementById('input-confirm').value;
            const errDiv = document.getElementById('alert-error');
            const spinner = document.getElementById('btn-submit-spinner');
            const btnText = document.getElementById('btn-submit-text');

            errDiv.classList.add('d-none'); errDiv.classList.remove('d-flex');

            if (pwd !== cfm) {
                document.getElementById('error-message').textContent = 'Passwords do not match.';
                errDiv.classList.remove('d-none'); errDiv.classList.add('d-flex');
                return;
            }

            spinner.style.display = 'inline-block';
            btnText.textContent = 'Updating...';
            document.getElementById('btn-submit').disabled = true;

            try {
                await api.auth.resetConfirm(email, otp, pwd);
                window.location.href = 'login.html?reset=1';
            } catch (err) {
                document.getElementById('error-message').textContent = err.message || 'The OTP is invalid or expired.';
                errDiv.classList.remove('d-none'); errDiv.classList.add('d-flex');
                spinner.style.display = 'none';
                btnText.textContent = 'Confirm Password';
                document.getElementById('btn-submit').disabled = false;
            }
        });
    </script>
</body>

</html>
