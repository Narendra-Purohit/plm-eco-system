<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PLM — Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../static/css/main.css">
<script src="../static/js/theme.js"></script>
</head>
<body class="d-flex flex-column min-vh-100 bg-body-tertiary">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg border-bottom sticky-top glass-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">
      <div class="ratio ratio-1x1 rounded ds-logo d-flex align-items-center justify-content-center" style="width: 32px; background: linear-gradient(135deg, #0d6efd, #6610f2); box-shadow: 0 4px 10px rgba(13, 110, 253, 0.4);"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ffffff" viewBox="0 0 16 16"><path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923z"/></svg></div>
      PLM System
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="topNav">
      <div class="ms-auto d-flex align-items-center gap-3 mt-3 mt-lg-0">
        <span id="role-badge" class="badge bg-info text-dark rounded-pill px-3 py-2 shadow-sm"></span>
        <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center p-0" style="width:36px;height:36px;" title="Toggle Theme">🌙</button>
        <button class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center p-0 shadow-sm transition-all" style="width:36px;height:36px;" id="user-icon" title="Sign out">
          👤
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid flex-grow-1 d-flex p-0" style="overflow-x: hidden;">
  <!-- Sidebar -->
  <div class="sidebar border-end p-3 d-none d-lg-block bg-body">
    <div class="small fw-bold text-uppercase text-muted mb-2 px-3 pt-2">Main Menu</div>
    <div class="nav flex-column nav-pills gap-1">
      <a href="dashboard.html" class="nav-link active d-flex align-items-center gap-2"><span class="fs-5">🏠</span> Dashboard</a>
      <a href="products.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">📦</span> Products</a>
      <a href="bom.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">🔧</span> Bill of Materials</a>
      <a href="ecos.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">📋</span> ECOs</a>
    </div>
    <div class="small fw-bold text-uppercase text-muted mb-2 px-3 pt-4">Insights</div>
    <div class="nav flex-column nav-pills gap-1">
      <a href="reports.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">📊</span> Reports</a>
      <a href="settings.html" class="nav-link d-flex align-items-center gap-2" id="settings-link" style="display:none !important;"><span class="fs-5">⚙️</span> Settings</a>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content flex-grow-1 p-4 p-md-5">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
      <div>
        <h1 class="h2 fw-bold mb-1" id="greeting">Welcome</h1>
        <p class="text-secondary mb-0">Your PLM engineering control centre</p>
      </div>
    </div>
    
    <!-- Stats -->
    <div class="row g-4 mb-5" id="stat-grid">
      <div class="col-sm-6 col-xl-3">
        <div class="card bg-body text-body border-0 h-100 hover-elevate transition-all">
          <div class="card-body p-4">
            <div class="fs-2 mb-2">📦</div>
            <div class="text-uppercase text-muted small fw-bold mb-1">Active Products</div>
            <div class="display-5 fw-bold mb-0" id="stat-products">
              <span class="spinner-border spinner-border-sm text-primary" role="status"></span>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="card bg-body text-body border-0 h-100 hover-elevate transition-all">
          <div class="card-body p-4">
            <div class="fs-2 mb-2">🔧</div>
            <div class="text-uppercase text-muted small fw-bold mb-1">Active BOMs</div>
            <div class="display-5 fw-bold mb-0" id="stat-boms">
              <span class="spinner-border spinner-border-sm text-primary" role="status"></span>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="card bg-body text-body border-0 h-100 hover-elevate transition-all">
          <div class="card-body p-4">
            <div class="fs-2 mb-2">📋</div>
            <div class="text-uppercase text-muted small fw-bold mb-1">Open ECOs</div>
            <div class="display-5 fw-bold mb-0" id="stat-ecos">
              <span class="spinner-border spinner-border-sm text-primary" role="status"></span>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="card bg-body text-body border-0 h-100 hover-elevate transition-all">
          <div class="card-body p-4">
            <div class="fs-2 mb-2">✅</div>
            <div class="text-uppercase text-muted small fw-bold mb-1">Applied ECOs</div>
            <div class="display-5 fw-bold mb-0" id="stat-applied">
              <span class="spinner-border spinner-border-sm text-primary" role="status"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent ECOs -->
    <div class="card bg-body border-0 overflow-hidden text-body mb-4">
      <div class="card-header bg-transparent border-bottom p-4">
        <h5 class="mb-0 fw-bold">Recent ECOs</h5>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <div id="recent-ecos-body" class="p-4 text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { api, getCurrentRole, isLoggedIn } from '../static/js/api.js';
if (!isLoggedIn()) { window.location.href = 'login.html'; }

const role = getCurrentRole() || localStorage.getItem('role');
const loginId = localStorage.getItem('login_id');

document.getElementById('greeting').textContent = `Welcome back, ${loginId}`;
document.getElementById('role-badge').textContent = role?.toUpperCase();
if (role === 'admin') document.getElementById('settings-link').style.setProperty('display', 'flex', 'important');

document.getElementById('user-icon').addEventListener('click', () => {
  if (confirm('Sign out?')) { localStorage.clear(); window.location.href = 'login.html'; }
});

async function loadStats() {
  try {
    const [products, boms, ecos] = await Promise.all([
      api.products.list('', 'active'),
      api.boms.list(''),
      api.ecos.list(),
    ]);
    document.getElementById('stat-products').textContent = products.length;
    document.getElementById('stat-boms').textContent = boms.filter(b => b.status === 'active').length;
    const openEcos = ecos.filter(e => e.status === 'active');
    const appliedEcos = ecos.filter(e => e.status === 'applied');
    document.getElementById('stat-ecos').textContent = openEcos.length;
    document.getElementById('stat-applied').textContent = appliedEcos.length;

    // Recent ECOs table
    const recent = [...ecos].sort((a,b) => new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
    const tbody = document.getElementById('recent-ecos-body');
    if (recent.length === 0) {
      tbody.className = "empty-state p-5";
      tbody.innerHTML = '<div class="display-3 mb-3 opacity-50">📋</div><h5>No ECOs yet</h5><p>Create your first ECO!</p>';
      return;
    }
    const statusColor = s => s==='applied'?'success':s==='active'?'info':'warning';
    
    tbody.className = "";
    tbody.innerHTML = `<table class="table table-hover align-middle mb-0">
      <thead class="table-light"><tr>
        <th class="ps-4">Title</th><th>Type</th><th>Product</th><th>Stage</th><th class="pe-4">Status</th>
      </tr></thead>
      <tbody>${recent.map(e=>`<tr class="data-table-row" onclick="location.href='eco_form.html?id=${e.id}'">
        <td class="ps-4 fw-medium">${e.title}</td>
        <td><span class="text-body-secondary">${e.eco_type}</span></td>
        <td>${e.product_name||'—'}</td>
        <td><span class="badge bg-secondary-subtle text-secondary border rounded-pill px-3">${e.stage_name||'—'}</span></td>
        <td class="pe-4"><span class="badge bg-${statusColor(e.status)}-subtle text-${statusColor(e.status)} border border-${statusColor(e.status)}-subtle rounded-pill px-3 py-2">${e.status}</span></td>
      </tr>`).join('')}</tbody>
    </table>`;
  } catch (e) {
    document.getElementById('recent-ecos-body').innerHTML = `<div class="alert alert-danger m-4 d-flex align-items-center gap-2"><span class="fs-4">⚠️</span> <div>${e.message}</div></div>`;
  }
}

loadStats();
</script>
</body>
</html>
