<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PLM — Reports</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../static/css/main.css">
<script src="../static/js/theme.js"></script>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'><circle cx='20' cy='20' r='18' fill='%23155EEF'/><circle cx='20' cy='20' r='9' fill='none' stroke='%23fff' stroke-width='2.5'/><path d='M14 20 A6 6 0 0 1 26 20' fill='none' stroke='%23fff' stroke-width='2.5' stroke-linecap='round'/><polyline points='24,17 26,20 23,21' fill='none' stroke='%23fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
</head>
<body class="d-flex flex-column min-vh-100 bg-body-tertiary">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg border-bottom sticky-top glass-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">
      <div class="ratio ratio-1x1 rounded ds-logo d-flex align-items-center justify-content-center" style="width: 32px;"><svg viewBox="0 0 40 40" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
  <circle cx="20" cy="20" r="9" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3"/>
  <path d="M14 20 A6 6 0 0 1 26 20" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
  <polyline points="24,17 26,20 23,21" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg></div>
      PLM System
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="topNav">
      <div class="ms-auto d-flex align-items-center gap-3 mt-3 mt-lg-0">
        <span id="role-badge" class="badge bg-info text-dark rounded-pill px-3 py-2 shadow-sm"></span>
        <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle d-flex align-items-center justify-content-center p-0" style="width:36px;height:36px;" title="Toggle Theme">🌙</button>
        <button class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center p-0 shadow-sm transition-all" style="width:36px;height:36px;" id="user-icon" title="Sign out" onclick="if(confirm('Sign out?')){localStorage.clear();location.href='login.html'}">
          👤
        </button>
      </div>
    </div>
  </div>
</nav>

<div class="container-fluid flex-grow-1 d-flex p-0" style="overflow-x: hidden;">
  <!-- Sidebar -->
  <div class="sidebar border-end p-3 d-none d-lg-block bg-body">
    <div class="small fw-bold text-uppercase text-muted mb-2 px-3 pt-2">Main Menu</div>
    <div class="nav flex-column nav-pills gap-1">
      <a href="dashboard.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">🏠</span> Dashboard</a>
      <a href="products.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">📦</span> Products</a>
      <a href="bom.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">🔧</span> Bill of Materials</a>
      <a href="ecos.html" class="nav-link d-flex align-items-center gap-2"><span class="fs-5">📋</span> ECOs</a>
    </div>
    <div class="small fw-bold text-uppercase text-muted mb-2 px-3 pt-4">Insights</div>
    <div class="nav flex-column nav-pills gap-1">
      <a href="reports.html" class="nav-link active d-flex align-items-center gap-2"><span class="fs-5">📊</span> Reports</a>
      <a href="settings.html" class="nav-link d-flex align-items-center gap-2" id="settings-link" style="display:none !important;"><span class="fs-5">⚙️</span> Settings</a>
    </div>
  </div>

  <main class="main-content flex-grow-1 p-4 p-md-5">
    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
      <div>
        <h1 class="h2 fw-bold mb-1">📊 Reports</h1>
      </div>
    </div>
    <div id="alert-error" class="alert alert-danger d-none align-items-center gap-2 mb-4"><span class="fs-5">❌</span> <span id="err-msg"></span></div>

    <div class="card bg-body border-0 shadow-sm">
      <div class="card-header bg-transparent pt-4 px-4 border-bottom-0 pb-0">
        <ul class="nav nav-tabs border-bottom-0" id="reportTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active fw-medium px-4 text-body border-0 border-bottom border-2 border-primary pb-3" data-bs-toggle="tab" data-bs-target="#tab-ecos" type="button" role="tab">ECO Summary</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link fw-medium px-4 text-secondary border-0 pb-3" data-bs-toggle="tab" data-bs-target="#tab-versions" type="button" role="tab" style="border-bottom:2px solid transparent;">Product Versions</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link fw-medium px-4 text-secondary border-0 pb-3" data-bs-toggle="tab" data-bs-target="#tab-boms" type="button" role="tab" style="border-bottom:2px solid transparent;">BOM History</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link fw-medium px-4 text-secondary border-0 pb-3" data-bs-toggle="tab" data-bs-target="#tab-archived" type="button" role="tab" style="border-bottom:2px solid transparent;">Archived Records</button>
          </li>
        </ul>
      </div>

      <div class="card-body p-0 border-top">
        <div class="tab-content">
          <div class="tab-pane fade show active" id="tab-ecos" role="tabpanel">
            <div class="table-responsive" id="ecos-body"><div class="p-5 text-center"><div class="spinner-border text-primary" role="status"></div></div></div>
          </div>
          <div class="tab-pane fade" id="tab-versions" role="tabpanel">
            <div class="table-responsive" id="versions-body"></div>
          </div>
          <div class="tab-pane fade" id="tab-boms" role="tabpanel">
            <div class="table-responsive" id="boms-body"></div>
          </div>
          <div class="tab-pane fade" id="tab-archived" role="tabpanel">
            <div class="table-responsive" id="archived-body"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Tab border sync
  const rtabs = document.querySelectorAll('#reportTabs button[data-bs-toggle="tab"]');
  rtabs.forEach(t => t.addEventListener('shown.bs.tab', e => {
    rtabs.forEach(tab => {
      tab.classList.remove('border-primary', 'text-body');
      tab.classList.add('text-secondary');
      tab.style.borderBottom = '2px solid transparent';
    });
    e.target.classList.add('border-primary', 'text-body');
    e.target.classList.remove('text-secondary');
    e.target.style.borderBottom = '';
  }));
</script>
<script type="module">
import { api, getCurrentRole, isLoggedIn } from '../static/js/api.js';
if (!isLoggedIn()) { window.location.href = 'login.html'; }
const role = getCurrentRole();
document.getElementById('role-badge').textContent = role?.toUpperCase();
if (role === 'admin') document.getElementById('settings-link').style.setProperty('display', 'flex', 'important');

const loaded = {};

async function loadTab(tab) {
  if (loaded[tab]) return;
  loaded[tab] = true;
  try {
    switch (tab) {
      case 'ecos': {
        const data = await api.reports.ecos();
        const statusColor = s => s==='applied'?'success':s==='active'?'info':'warning';
        document.getElementById('ecos-body').innerHTML = data.length === 0
          ? '<div class="empty-state p-5 text-center"><div class="display-3 mb-3 opacity-50">📋</div><h5>No ECOs yet.</h5></div>'
          : `<table class="table table-hover align-middle mb-0"><thead class="table-light"><tr><th class="ps-4">Title</th><th>Type</th><th>Product</th><th>Stage</th><th>Status</th><th>Effective Date</th><th class="pe-4 text-end">Changes</th></tr></thead>
            <tbody>${data.map(e=>`<tr>
              <td class="ps-4 fw-medium"><a href="eco_form.html?id=${e.id}" class="text-decoration-none">${e.title}</a></td>
              <td><span class="text-secondary">${e.eco_type}</span></td><td>${e.product_name}</td>
              <td><span class="badge bg-secondary-subtle text-secondary border rounded-pill px-3">${e.stage}</span></td>
              <td><span class="badge bg-${statusColor(e.status)}-subtle text-${statusColor(e.status)} border border-${statusColor(e.status)}-subtle rounded-pill px-3 py-2 text-capitalize">${e.status}</span></td>
              <td class="text-secondary small">${e.effective_date ? new Date(e.effective_date).toLocaleDateString() : '—'}</td>
              <td class="pe-4 text-end"><a href="eco_diff.html?id=${e.id}" target="_blank" class="btn btn-outline-info btn-sm shadow-sm rounded-pill px-3 py-1">🔍 View</a></td>
            </tr>`).join('')}</tbody></table>`;
        break;
      }
      case 'versions': {
        const data = await api.reports.productVersions();
        document.getElementById('versions-body').innerHTML = data.length === 0
          ? '<div class="empty-state p-5 text-center"><div class="display-3 mb-3 opacity-50">📦</div><h5>No product versions found.</h5></div>'
          : `<table class="table table-hover align-middle mb-0"><thead class="table-light"><tr><th class="ps-4">Product Name</th><th>Version</th><th>Status</th><th>Sales Price</th><th>Cost Price</th><th class="pe-4">Created</th></tr></thead>
            <tbody>${data.map(p=>`<tr>
              <td class="ps-4 fw-medium">${p.name}</td>
              <td><span class="badge bg-secondary-subtle text-secondary border rounded-pill px-3">v${p.version}</span></td>
              <td><span class="badge bg-${p.status==='active'?'success':'danger'}-subtle text-${p.status==='active'?'success':'danger'} border border-${p.status==='active'?'success':'danger'}-subtle rounded-pill px-3 py-2 text-capitalize">${p.status}</span></td>
              <td>$${p.sales_price}</td><td>$${p.cost_price}</td>
              <td class="pe-4 text-secondary small">${new Date(p.created_at).toLocaleDateString()}</td>
            </tr>`).join('')}</tbody></table>`;
        break;
      }
      case 'boms': {
        const data = await api.reports.bomHistory();
        document.getElementById('boms-body').innerHTML = data.length === 0
          ? '<div class="empty-state p-5 text-center"><div class="display-3 mb-3 opacity-50">🔧</div><h5>No BOMs found.</h5></div>'
          : `<table class="table table-hover align-middle mb-0"><thead class="table-light"><tr><th class="ps-4">Reference</th><th>Product</th><th>Version</th><th>Status</th><th class="pe-4">Created</th></tr></thead>
            <tbody>${data.map(b=>`<tr>
              <td class="ps-4 fw-bold text-primary">${b.reference}</td><td class="fw-medium">${b.product_name}</td>
              <td><span class="badge bg-secondary-subtle text-secondary border rounded-pill px-3">v${b.version}</span></td>
              <td><span class="badge bg-${b.status==='active'?'success':'danger'}-subtle text-${b.status==='active'?'success':'danger'} border border-${b.status==='active'?'success':'danger'}-subtle rounded-pill px-3 py-2 text-capitalize">${b.status}</span></td>
              <td class="pe-4 text-secondary small">${new Date(b.created_at).toLocaleDateString()}</td>
            </tr>`).join('')}</tbody></table>`;
        break;
      }
      case 'archived': {
        const data = await api.reports.archived();
        const pBody = data.archived_products.length === 0
          ? '<tr><td colspan="4" class="text-center text-muted p-4">No archived products.</td></tr>'
          : data.archived_products.map(p=>`<tr><td class="ps-4 fw-medium">${p.name}</td><td><span class="badge bg-secondary-subtle text-secondary border rounded-pill px-3">v${p.version}</span></td><td class="text-secondary small">${new Date(p.created_at).toLocaleDateString()}</td><td class="pe-4 text-end"><a href="product_form.html?id=${p.id}" class="btn btn-sm btn-outline-secondary">View</a></td></tr>`).join('');
        const bBody = data.archived_boms.length === 0
          ? '<tr><td colspan="4" class="text-center text-muted p-4">No archived BOMs.</td></tr>'
          : data.archived_boms.map(b=>`<tr><td class="ps-4 fw-bold text-primary">${b.reference}</td><td class="fw-medium">${b.product}</td><td><span class="badge bg-secondary-subtle text-secondary border rounded-pill px-3">v${b.version}</span></td><td class="pe-4 text-secondary small">${new Date(b.created_at).toLocaleDateString()}</td></tr>`).join('');
        document.getElementById('archived-body').innerHTML = `
          <div class="bg-body-secondary px-4 py-3 fw-bold border-bottom d-flex align-items-center gap-2"><span class="fs-5">🗂️</span> Archived Products</div>
          <table class="table table-hover align-middle mb-0"><thead class="table-light"><tr><th class="ps-4">Name</th><th>Version</th><th>Archived</th><th class="pe-4 text-end"></th></tr></thead><tbody>${pBody}</tbody></table>
          <div class="bg-body-secondary px-4 py-3 fw-bold border-bottom border-top mt-4 d-flex align-items-center gap-2"><span class="fs-5">🗂️</span> Archived BOMs</div>
          <table class="table table-hover align-middle mb-0"><thead class="table-light"><tr><th class="ps-4">Reference</th><th>Product</th><th>Version</th><th class="pe-4">Archived</th></tr></thead><tbody>${bBody}</tbody></table>`;
        break;
      }
    }
  } catch(e) {
    document.getElementById('err-msg').textContent = e.message;
    document.getElementById('alert-error').classList.remove('d-none');
    document.getElementById('alert-error').classList.add('d-flex');
  }
}

rtabs.forEach(btn => btn.addEventListener('shown.bs.tab', e => {
  const targetId = e.target.getAttribute('data-bs-target').replace('#tab-', '');
  loadTab(targetId);
}));

loadTab('ecos');
</script>
</body>
</html>
